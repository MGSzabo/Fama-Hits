
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fama Hits</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="images/header.png" alt="Fama Hits">
</header>

<main>

    <h1>Fama Hits</h1>
    <p>Ouça e baixe minhas músicas.</p>

    <!-- GOSPEL -->

    <button class="categoria" onclick="alternar('gospel')">
        🎵 Gospel
    </button>

    <div id="gospel" class="lista">

    <div class="musica">

        <button class="ouvir" id="botaoPlay" onclick="tocarMusica()">
            ▶
        </button>

        <span class="nome-musica">
            Amor Vazio
        </span>

        <a class="baixar" href="music/Amor Vazio.mp3" download>
            ⬇ Baixar
        </a>

    </div>

    <audio id="amorVazio" src="music/Amor Vazio.mp3"></audio>

</div>

    <!-- MÚSICAS COM TEMA -->

    <button class="categoria" onclick="alternar('tema')">
        📦 Fora da Caixa
    </button>

    <div id="tema" class="lista">

        <div class="musica">

            <span class="nome-musica">
                (Em breve)
            </span>

        </div>

    </div>

</main>

<script>

function alternar(id){

    let lista = document.getElementById(id);

    if(lista.style.display==="block"){

        lista.style.display="none";

    }else{

        lista.style.display="block";

    }

}

    function tocarMusica(){

    let musica = document.getElementById("amorVazio");
    let botao = document.getElementById("botaoPlay");

    if(musica.paused){

        musica.play();

        botao.innerHTML = "⏸";

    }else{

        musica.pause();

        botao.innerHTML = "▶";

    }

}
    
</script>

</body>
</html>
